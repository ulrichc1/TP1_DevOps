<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire Utilisateur - DockerJavaSpringBoot</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="brand">DockerJavaSpringBoot</a>
        <a th:href="@{/produits}">Produits</a>
        <a th:href="@{/utilisateurs}">Utilisateurs</a>
    </nav>

    <div class="container">
        <h1 th:text="${utilisateur.id != null ? 'Modifier l\'utilisateur' : 'Nouvel utilisateur'}"></h1>

        <div class="card">
            <form th:action="@{/utilisateurs/enregistrer}" th:object="${utilisateur}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" th:field="*{nom}" placeholder="Nom de famille">
                    <div class="error-message" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
                </div>

                <div class="form-group">
                    <label for="prenom">Prénom</label>
                    <input type="text" id="prenom" th:field="*{prenom}" placeholder="Prénom">
                    <div class="error-message" th:if="${#fields.hasErrors('prenom')}" th:errors="*{prenom}"></div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" placeholder="email@exemple.com">
                    <div class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="actions">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <a th:href="@{/utilisateurs}" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>

    <footer>
        INGE2APP LSI1 | 06/03/2026
    </footer>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilisateurs - DockerJavaSpringBoot</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="brand">DockerJavaSpringBoot</a>
        <a th:href="@{/produits}">Produits</a>
        <a th:href="@{/utilisateurs}">Utilisateurs</a>
    </nav>

    <div class="container">
        <h1>Liste des Utilisateurs</h1>

        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${erreur}" class="alert alert-danger" th:text="${erreur}"></div>

        <p>
            <a th:href="@{/utilisateurs/nouveau}" class="btn btn-primary">+ Ajouter un utilisateur</a>
        </p>

        <table th:if="${!utilisateurs.isEmpty()}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="utilisateur : ${utilisateurs}">
                    <td th:text="${utilisateur.id}"></td>
                    <td th:text="${utilisateur.nom}"></td>
                    <td th:text="${utilisateur.prenom}"></td>
                    <td th:text="${utilisateur.email}"></td>
                    <td class="actions">
                        <a th:href="@{/utilisateurs/modifier/{id}(id=${utilisateur.id})}" class="btn btn-warning">Modifier</a>
                        <a th:href="@{/utilisateurs/supprimer/{id}(id=${utilisateur.id})}" class="btn btn-danger"
                           onclick="return confirm('Êtes-vous sûr de vouloir supprimer cet utilisateur ?')">Supprimer</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${utilisateurs.isEmpty()}" class="card">
            <p>Aucun utilisateur trouvé. Ajoutez-en un !</p>
        </div>
    </div>

    <footer>
        INGE2APP LSI1 | 06/03/2026
    </footer>
</body>
</html>

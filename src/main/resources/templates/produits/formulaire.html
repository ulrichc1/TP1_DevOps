<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire Produit - DockerJavaSpringBoot</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="brand">DockerJavaSpringBoot</a>
        <a th:href="@{/produits}">Produits</a>
        <a th:href="@{/utilisateurs}">Utilisateurs</a>
    </nav>

    <div class="container">
        <h1 th:text="${produit.id != null ? 'Modifier le produit' : 'Nouveau produit'}"></h1>

        <div class="card">
            <form th:action="@{/produits/enregistrer}" th:object="${produit}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" th:field="*{nom}" placeholder="Nom du produit">
                    <div class="error-message" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" th:field="*{description}" placeholder="Description du produit"></textarea>
                </div>

                <div class="form-group">
                    <label for="prix">Prix (€)</label>
                    <input type="number" id="prix" th:field="*{prix}" step="0.01" placeholder="0.00">
                    <div class="error-message" th:if="${#fields.hasErrors('prix')}" th:errors="*{prix}"></div>
                </div>

                <div class="form-group">
                    <label for="quantite">Quantité</label>
                    <input type="number" id="quantite" th:field="*{quantite}" placeholder="0">
                    <div class="error-message" th:if="${#fields.hasErrors('quantite')}" th:errors="*{quantite}"></div>
                </div>

                <div class="actions">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <a th:href="@{/produits}" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>

    <footer>
        INGE2APP LSI1 | 06/03/2026
    </footer>
</body>
</html>

name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  quality:
    name: Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run quality checks and coverage
        run: ./gradlew clean check jacocoTestReport

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            build/reports/tests/test
            build/reports/jacoco/test/html

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: quality
    if: ${{ github.event_name == 'push' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${GITHUB_REF_NAME}" = "master" ] || [ "${GITHUB_REF_NAME}" = "main" ]; then
            ./gradlew clean test jacocoTestReport sonar -Dsonar.token=${SONAR_TOKEN} -Dsonar.verbose=true
          else
            ./gradlew clean test jacocoTestReport sonar -Dsonar.token=${SONAR_TOKEN} -Dsonar.branch.name=${GITHUB_REF_NAME} -Dsonar.verbose=true
          fi

  build-and-smoke:
    name: Docker Build + Smoke
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t tp1-app .

      - name: Smoke test
        run: |
          docker run -d --name smoketest -p 8080:8080 tp1-app
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080 > /dev/null && echo "App is up!" && exit 0
            sleep 1
          done
          echo "App failed to start"
          docker logs smoketest
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f smoketest 2>/dev/null || true
